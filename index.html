<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link  rel="stylesheet"  href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"  crossorigin="anonymous"/>
    <link   rel="stylesheet"  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"   />
    <link rel="icon" type="image/png" href="favicon.png" />
    <title>Solidarité Partagée</title>
  </head>
  <body class="p-4 bg-white">
    <div class="container mx-auto p-4 border border-success rounded mb-3 w-75 shadow">
      <h3 class="text-center w-75 mx-auto bg-white text-success rounded"> <i class="fa-solid fa-hand-holding-heart"></i> Soumission de Candidature </h3>
      <form action="" class="mb-3" id="myform">
        <div class="mb-3">
          <label for="nom" class="form-label"><i class="fa-solid fa-user"></i> Nom Complet: </label>
          <input  type="text"  name="nom"  id="nom"  class="form-control"  placeholder="Trevor Noah" required  />
        </div>
        <div class="mb-3">
          <label for="ville" class="form-label"><i class="fa-solid fa-location-dot"></i> Ville:</label>
          <select id="ville" class="form-select" required>
            <option value="" selected disabled>Ville</option>
            <option value="Tanger">Tanger</option>
            <option value="Tetouan">Tetouan</option>
            <option value="Kenitra">Kenitra</option>
            <option value="Rabat">Rabat</option>
            <option value="Casablanca">Casablanca</option>
            <option value="Marrakech">Marrakech</option>
            <option value="Agadir">Agadir</option>
          </select>
        </div>
        <div class="mb-3">
          <label for="competence" class="form-label"><i class="fa-solid fa-gears"></i> Compétence:</label>
          <select  name="competence"  id="competence" class="form-select" required>
            <option value="" selected disabled>Compétence</option>
            <option value="Médecin">Médecin</option>
            <option value="Éducateur">Éducateur</option>
            <option value="Infirmier">Infirmier</option>
            <option value="Responsable d'activité">
              Responsable d'activité
            </option>
          </select>
        </div>
        <div class="mb-3">
          <label for="disponibilite" class="form-label"
            ><i class="fa-solid fa-clock"></i> Disponibilité:
          </label>
          <select
            name="disponibilite"
            id="disponibilite"
            class="form-select"
            required
          >
            <option value="" selected disabled>Disponibilité</option>
            <option value="A temps plein">A temps plein</option>
            <option value="Semaine">Semaine</option>
            <option value="Week-end">Week-end</option>
            <option value="Soirée">Soirée</option>
            <option value="Jour">Jour</option>
          </select>
        </div>
        <div class="mb-3">
          <label for="mission" class="form-label"
            ><i class="fa-solid fa-briefcase"></i> Mission souhaitée:
          </label>
          <select name="mission" id="mission" class="form-select" required>
            <option value="" selected disabled>Mission souhaitée</option>
            <option value="Collecte de vêtements">Collecte de vêtements</option>
            <option value="Consultations médicales">
              Consultations médicales
            </option>
            <option value="Distribution de nourriture">
              Distribution de nourriture
            </option>
            <option value="Infirmier">Infirmier</option>
          </select>
        </div>
        <div class="mb-3">
          <label for="email" class="form-label"
            ><i class="fa-solid fa-envelope"></i> Email:</label
          >
          <input
            type="email"
            name=""
            id="email"
            class="form-control"
            placeholder="trevornoah@gmail.com"
            required
          />
        </div>
        <div class="mb-3">
          <label for="password" class="form-label"
            ><i class="fa-solid fa-lock"></i> Mot de passe:
          </label>
          <input
            type="password"
            name=""
            id="password"
            minlength="7"
            placeholder="supérieure à 6 caractères"
            class="form-control"
            required
          />
        </div>
        <div class="text-center">
          <button class="btn form-control btn-success" id="soumettre">
            Soumettre
          </button>
        </div>
      </form>
    </div>

    <hr />
    <div class="container">
      <h3 class="text-center w-75 mx-auto bg-white mb-2 text-success rounded">
        <i class="fa-solid fa-people-group"></i> Tableau des Candidatures
      </h3>
      <div class="table-responsive">
        <table
          class="table table-bordered table-striped border-success text-center shadow"
        >
          <thead class="table-success position-sticky top-0">
            <tr>
              <th>
                <input type="checkbox" name="" id="selectAll" onclick="selectAll()" class="form-check-input"/>
              </th>
              <th>Nom Complet</th>
              <th>Ville</th>
              <th>Compétence</th>
              <th>Disponibilité</th>
              <th>Type de mission</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="table_content"></tbody>
          <tfoot class="table-light">  <tr> <td colspan="7">   <button  onclick="delChecked()"  class="btn btn-sm text-danger btn-link"  >  Supprimer Sélection<span id="numSelected"></span> </button>  </td>  </tr>  </tfoot>
        </table>
      </div>
    </div>
    <script src="script.js" defer></script>
  </body>
</html>
